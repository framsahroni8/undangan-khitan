<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Tamu Khitanan</title>

    <link rel="stylesheet" href="admin.css">
</head>

<body>

    <main class="admin-container">

        <header class="admin-header">
            <div>
                <p class="eyebrow">ADMIN PANEL</p>
                <h1>Daftar Tamu Khitanan</h1>
                <p class="subtitle">
                    Tambahkan dan kelola daftar tamu undangan.
                </p>
            </div>

            <div class="stats">
                <div class="stat-card">
                    <span id="totalGuest">0</span>
                    <small>Total Tamu</small>
                </div>

                <div class="stat-card">
                    <span id="totalPerson">0</span>
                    <small>Total Orang</small>
                </div>

                <div class="stat-card">
                    <span id="totalPresent">0</span>
                    <small>Konfirmasi Hadir</small>
                </div>
            </div>
        </header>

        <section class="form-card">

            <h2>Tambah Tamu</h2>

            <form id="guestForm">

                <div class="form-group">
                    <label for="nama">Nama Tamu</label>
                    <input
                        id="nama"
                        type="text"
                        placeholder="Contoh: Bapak Andi dan Keluarga"
                        required
                    >
                </div>

                <div class="form-grid">

                    <div class="form-group">
                        <label for="person">Jumlah Orang</label>
                        <input
                            id="person"
                            type="number"
                            min="1"
                            value="1"
                            required
                        >
                    </div>

                    <div class="form-group checkbox-group">
                        <label for="kehadiran">Status Kehadiran</label>

                        <label class="checkbox-label">
                            <input id="kehadiran" type="checkbox">
                            Sudah konfirmasi hadir
                        </label>
                    </div>

                </div>

                <button type="submit" class="btn-primary">
                    + Tambah Tamu
                </button>

            </form>

        </section>

        <section class="table-card">

            <div class="table-top">

                <h2>Data Tamu</h2>

                <input
                    id="searchGuest"
                    type="search"
                    placeholder="Cari nama tamu..."
                >

            </div>

            <div class="table-wrapper">

                <table>

                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Nama</th>
                            <th>Orang</th>
                            <th>Kehadiran</th>
                            <th>Link Undangan</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>

                    <tbody id="guestTableBody">
                        <tr>
                            <td colspan="6" class="empty-state">
                                Memuat data tamu...
                            </td>
                        </tr>
                    </tbody>

                </table>

            </div>

        </section>

    </main>

    <div id="toast"></div>

    <script type="module" src="admin.js"></script>

</body>
</html>
